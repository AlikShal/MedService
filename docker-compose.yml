services:
  postgres:
    image: postgres:16-alpine
    container_name: medsync-postgres
    environment:
      POSTGRES_DB: medical_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medical_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medsync

  auth-service:
    build: ./auth-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: medical_platform
      DB_SSLMODE: disable
      JWT_SECRET: medical-platform-secret
      JWT_TTL: 24h
      ADMIN_EMAIL: admin@medsync.local
      ADMIN_PASSWORD: admin123
      ADMIN_FULL_NAME: Clinic Administrator
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - medsync

  patient-service:
    build: ./patient-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: medical_platform
      DB_SSLMODE: disable
      JWT_SECRET: medical-platform-secret
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - medsync

  doctor-service:
    build: ./doctor-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: medical_platform
      DB_SSLMODE: disable
      JWT_SECRET: medical-platform-secret
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - medsync

  appointment-service:
    build: ./appointment-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: medical_platform
      DB_SSLMODE: disable
      JWT_SECRET: medical-platform-secret
      DOCTOR_SERVICE_URL: http://doctor-service:8080
      PATIENT_SERVICE_URL: http://patient-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      patient-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - medsync

  chat-service:
    build: ./chat-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: medical_platform
      DB_SSLMODE: disable
      JWT_SECRET: medical-platform-secret
      PATIENT_SERVICE_URL: http://patient-service:8083
      APPOINTMENT_SERVICE_URL: http://appointment-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8084/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - medsync

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      auth-service:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
    networks:
      - medsync

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: medsync-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
    depends_on:
      auth-service:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
    networks:
      - medsync

  grafana:
    image: grafana/grafana-oss:11.3.0
    container_name: medsync-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - medsync

volumes:
  postgres-data:

networks:
  medsync:
