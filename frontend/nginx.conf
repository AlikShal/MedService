server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /api/auth/register {
        proxy_pass http://auth-service:8082/auth/register;
    }

    location = /api/auth/login {
        proxy_pass http://auth-service:8082/auth/login;
    }

    location = /api/auth/me {
        proxy_pass http://auth-service:8082/auth/me;
    }

    location = /api/doctors {
        proxy_pass http://doctor-service:8080/doctors;
    }

    location /api/doctors/ {
        rewrite ^/api/doctors/(.*)$ /doctors/$1 break;
        proxy_pass http://doctor-service:8080;
    }

    location = /api/patients {
        proxy_pass http://patient-service:8083/patients;
    }

    location = /api/patients/me {
        proxy_pass http://patient-service:8083/patients/me;
    }

    location /api/patients/ {
        rewrite ^/api/patients/(.*)$ /patients/$1 break;
        proxy_pass http://patient-service:8083;
    }

    location = /api/appointments {
        proxy_pass http://appointment-service:8081/appointments;
    }

    location /api/appointments/ {
        rewrite ^/api/appointments/(.*)$ /appointments/$1 break;
        proxy_pass http://appointment-service:8081;
    }

    location = /api/health/auth {
        proxy_pass http://auth-service:8082/health;
    }

    location = /api/health/patient {
        proxy_pass http://patient-service:8083/health;
    }

    location = /api/health/doctor {
        proxy_pass http://doctor-service:8080/health;
    }

    location = /api/health/appointment {
        proxy_pass http://appointment-service:8081/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
